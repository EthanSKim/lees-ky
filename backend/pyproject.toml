[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["alembic/versions", "alembic/env.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI's Depends()/Body() in argument defaults is the intended pattern, not a bug.
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
# Long descriptive strings transcribed verbatim from the printed menu -
# wrapping them would hurt readability, not help it.
"app/scripts/seed_menu.py" = ["E501"]

[tool.black]
line-length = 100
target-version = ["py312"]
